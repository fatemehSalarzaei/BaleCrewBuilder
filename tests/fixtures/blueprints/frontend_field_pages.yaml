blueprint_version: "1.0"

project:
  name: "Field Page Platform"
  slug: "field-page-platform"
  platform: "bale"
  backend: "fastapi"
  frontend: "miniapp_panel"
  generation_mode: "documentation_first"

workflow:
  documentation_required: true
  human_approval_required: true
  document_status: "DOCUMENT_APPROVED"
  implementation_starts_after: "BLUEPRINT_VALIDATED"

actors:
  - key: "member"
    name: "Member"
    type: "user"
  - key: "admin_user"
    name: "Administrator"
    type: "admin"

roles:
  - key: "member"
    title: "Member"
    is_admin: false
  - key: "admin"
    title: "Administrator"
    is_admin: true

permissions:
  - key: "view_items"
    description: "View items"
    roles: ["member", "admin"]
  - key: "manage_items"
    description: "Manage items"
    roles: ["admin"]

bots:
  - key: "user_bot"
    title: "Member Bot"
    audience: "users"
    token_env: "USER_BOT_TOKEN"
    webhook_path: "/webhook/user"
    allowed_roles: ["member"]
    miniapp_default_route: "/items"
    commands:
      - command: "/start"
        description: "Start"
        handler: "handle_start"
        allowed_roles: ["member"]
    handlers: ["handle_start"]
    security_policy:
      require_registered_user: true
      audit_sensitive_callbacks: false
  - key: "admin_bot"
    title: "Admin Bot"
    audience: "admins"
    token_env: "ADMIN_BOT_TOKEN"
    webhook_path: "/webhook/admin"
    allowed_roles: ["admin"]
    miniapp_default_route: "/admin/items/new"
    commands:
      - command: "/start"
        description: "Start"
        handler: "admin_handle_start"
        allowed_roles: ["admin"]
    handlers: ["admin_handle_start"]
    security_policy:
      require_registered_user: true
      audit_sensitive_callbacks: true

miniapp:
  enabled: true
  auth_endpoint: "/auth/bale-miniapp"
  routes:
    - path: "/items"
      allowed_roles: ["member", "admin"]
      page_type: "list"
      api_dependencies: ["list_items"]
    - path: "/admin/items/new"
      allowed_roles: ["admin"]
      page_type: "form"
      api_dependencies: ["create_item"]
    - path: "/items/detail"
      allowed_roles: ["member", "admin"]
      page_type: "detail"
      api_dependencies: ["get_item"]
    - path: "/admin/report"
      allowed_roles: ["admin"]
      page_type: "report"
      api_dependencies: ["item_report"]

backend:
  framework: "fastapi"
  python_version: "3.12"
  async_mode: true
  additional_packages: []

database:
  entities:
    - name: "users"
      table_name: "users"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
        - name: "display_name"
          type: "string"
      relationships: []
      indexes: []
      audit: false
    - name: "roles"
      table_name: "roles"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
        - name: "key"
          type: "string"
          nullable: false
          unique: true
      relationships: []
      indexes: ["key"]
      audit: false
    - name: "items"
      table_name: "items"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
        - name: "title"
          type: "string"
          nullable: false
        - name: "summary"
          type: "text"
        - name: "priority"
          type: "integer"
        - name: "is_active"
          type: "boolean"
          default: true
        - name: "created_at"
          type: "datetime"
      relationships: []
      indexes: ["title"]
      audit: true

flows:
  - key: "manage_items"
    name: "Manage Items"
    trigger: "admin creates item"
    steps:
      - step: 1
        actor: "admin_user"
        action: "create"
        target: "items"
    bots_involved: ["admin_bot"]
    api_calls: ["create_item"]

api:
  endpoints:
    - name: "health_check"
      method: "GET"
      path: "/health"
      auth_required: false
      allowed_roles: []
      request_schema: null
      response_schema: "HealthResponse"
      service_method: "health_check"
      audit_required: false
    - name: "bale_miniapp_auth"
      method: "POST"
      path: "/auth/bale-miniapp"
      auth_required: false
      allowed_roles: []
      request_schema: "BaleMiniAppAuthRequest"
      response_schema: "AuthResponse"
      service_method: "auth_service.verify_miniapp_token"
      audit_required: false
    - name: "list_items"
      method: "GET"
      path: "/api/v1/items"
      auth_required: true
      allowed_roles: ["member", "admin"]
      request_schema: null
      response_schema: "ItemListResponse"
      service_method: "item_service.list_items"
      audit_required: false
    - name: "get_item"
      method: "GET"
      path: "/api/v1/items/{item_id}"
      auth_required: true
      allowed_roles: ["member", "admin"]
      request_schema: null
      response_schema: "ItemResponse"
      service_method: "item_service.get_item"
      audit_required: false
    - name: "create_item"
      method: "POST"
      path: "/api/v1/admin/items"
      auth_required: true
      allowed_roles: ["admin"]
      request_schema: "ItemCreate"
      response_schema: "ItemResponse"
      service_method: "item_service.create_item"
      audit_required: true
    - name: "item_report"
      method: "GET"
      path: "/api/v1/admin/items/report"
      auth_required: true
      allowed_roles: ["admin"]
      request_schema: null
      response_schema: "ItemReport"
      service_method: "item_service.item_report"
      audit_required: true

security:
  miniapp_hmac_validation: true
  jwt_enabled: true
  bot_webhook_secret: true
  audit_log_enabled: true
  rbac_enabled: true

testing:
  test_framework: "pytest"
  coverage_target: 80
  test_stubs: []

generation:
  template_profile: "fastapi_react_bale_v1"
  enabled_modules: ["rbac", "audit_log", "bale_client", "miniapp_auth", "redis_session"]
  custom_logic_blocks: []
  output_format: "zip"
