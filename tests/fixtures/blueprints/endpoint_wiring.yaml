blueprint_version: "1.0"

project:
  name: "Endpoint Wiring Platform"
  slug: "endpoint-wiring-platform"
  platform: "bale"
  backend: "fastapi"
  frontend: "miniapp_panel"
  generation_mode: "documentation_first"

workflow:
  documentation_required: true
  human_approval_required: true
  document_status: "DOCUMENT_APPROVED"
  implementation_starts_after: "BLUEPRINT_VALIDATED"

actors:
  - key: "member"
    name: "Member"
    type: "user"
  - key: "admin_user"
    name: "Administrator"
    type: "admin"

roles:
  - key: "member"
    title: "Member"
    is_admin: false
  - key: "admin"
    title: "Administrator"
    is_admin: true

permissions:
  - key: "view_items"
    description: "View items"
    roles: ["member", "admin"]
  - key: "manage_items"
    description: "Manage items"
    roles: ["admin"]

bots:
  - key: "user_bot"
    title: "Member Bot"
    audience: "users"
    token_env: "USER_BOT_TOKEN"
    webhook_path: "/webhook/user"
    allowed_roles: ["member"]
    miniapp_default_route: "/user/dashboard"
    commands:
      - command: "/start"
        description: "Start"
        handler: "handle_start"
        allowed_roles: ["member"]
    handlers: ["handle_start"]
    security_policy:
      require_registered_user: true
      audit_sensitive_callbacks: false
  - key: "admin_bot"
    title: "Admin Bot"
    audience: "admins"
    token_env: "ADMIN_BOT_TOKEN"
    webhook_path: "/webhook/admin"
    allowed_roles: ["admin"]
    miniapp_default_route: "/admin/dashboard"
    commands:
      - command: "/start"
        description: "Start"
        handler: "admin_handle_start"
        allowed_roles: ["admin"]
    handlers: ["admin_handle_start"]
    security_policy:
      require_registered_user: true
      audit_sensitive_callbacks: true

miniapp:
  enabled: true
  auth_endpoint: "/auth/bale-miniapp"
  routes:
    - path: "/user/dashboard"
      allowed_roles: ["member"]
      page_type: "dashboard"
      api_dependencies: ["list_items"]
    - path: "/admin/dashboard"
      allowed_roles: ["admin"]
      page_type: "dashboard"
      api_dependencies: ["admin_delete_item"]

backend:
  framework: "fastapi"
  python_version: "3.12"
  async_mode: true
  additional_packages: []

database:
  entities:
    - name: "users"
      table_name: "users"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "roles"
      table_name: "roles"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "permissions"
      table_name: "permissions"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "user_roles"
      table_name: "user_roles"
      fields:
        - name: "user_id"
          type: "uuid"
          nullable: false
        - name: "role_id"
          type: "uuid"
          nullable: false
      relationships: ["users", "roles"]
      indexes: []
      audit: false
    - name: "role_permissions"
      table_name: "role_permissions"
      fields:
        - name: "role_id"
          type: "uuid"
          nullable: false
        - name: "permission_id"
          type: "uuid"
          nullable: false
      relationships: ["roles", "permissions"]
      indexes: []
      audit: false
    - name: "bale_accounts"
      table_name: "bale_accounts"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: ["users"]
      indexes: []
      audit: false
    - name: "bots"
      table_name: "bots"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "bot_conversations"
      table_name: "bot_conversations"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: ["bots"]
      indexes: []
      audit: false
    - name: "processed_updates"
      table_name: "processed_updates"
      fields:
        - name: "update_id"
          type: "string"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "audit_logs"
      table_name: "audit_logs"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "app_settings"
      table_name: "app_settings"
      fields:
        - name: "key"
          type: "string"
          primary_key: true
          nullable: false
      relationships: []
      indexes: []
      audit: false
    - name: "items"
      table_name: "items"
      fields:
        - name: "id"
          type: "uuid"
          primary_key: true
          nullable: false
        - name: "title"
          type: "string"
          nullable: false
      relationships: []
      indexes: []
      audit: true

flows: []

api:
  endpoints:
    - name: "public_ping"
      method: "GET"
      path: "/public/ping"
      auth_required: false
      allowed_roles: []
      request_schema: null
      response_schema: "PingResponse"
      service_method: "public_ping"
      audit_required: false
    - name: "create_item"
      method: "POST"
      path: "/api/v1/items"
      auth_required: true
      allowed_roles: ["member", "admin"]
      request_schema: "ItemCreate"
      response_schema: "ItemRead"
      service_method: "item_service.create_item"
      audit_required: false
    - name: "get_item"
      method: "GET"
      path: "/api/v1/items/{item_id}"
      auth_required: true
      allowed_roles: ["member", "admin"]
      request_schema: null
      response_schema: "ItemRead"
      service_method: "item_service.get_item"
      audit_required: false
    - name: "update_item"
      method: "PATCH"
      path: "/api/v1/items/{item_id}"
      auth_required: true
      allowed_roles: ["member", "admin"]
      request_schema: "ItemUpdate"
      response_schema: "ItemRead"
      service_method: "item_service.update_item"
      audit_required: false
    - name: "admin_delete_item"
      method: "DELETE"
      path: "/api/v1/admin/items/{item_id}"
      auth_required: true
      allowed_roles: ["admin"]
      request_schema: null
      response_schema: null
      service_method: "item_service.admin_delete_item"
      audit_required: true

security:
  miniapp_hmac_validation: true
  jwt_enabled: true
  bot_webhook_secret: true
  audit_log_enabled: true
  rbac_enabled: true

testing:
  test_framework: "pytest"
  coverage_target: 80
  test_stubs: []

generation:
  template_profile: "fastapi_react_bale_v1"
  enabled_modules: ["rbac", "audit_log", "bale_client", "miniapp_auth"]
  custom_logic_blocks: []
  output_format: "zip"
